<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Lib.pyL</title>
    <style>
        /* 1. 전체적인 분위기 (배경색과 글자색) */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a; /* 진한 남색 배경 */
            color: #f8fafc; /* 밝은 회색 글자 */
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* 2. 상단 메뉴바 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background-color: #1e293b;
            border-bottom: 2px solid #334155;
        }
        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #94a3b8;
            font-weight: bold;
            transition: 0.3s; /* 마우스를 올렸을 때 천천히 변하게 해요 */
        }
        nav a:hover { color: #38bdf8; } /* 하늘색으로 반짝! */

        /* 3. 메인 소개 섹션 */
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        }
        .hero h1 { font-size: 3rem; color: #38bdf8; margin: 0; }
        .hero p { font-size: 1.2rem; color: #94a3b8; }

        /* 4. 컨텐츠 구역 레이아웃 */
        .container { max-width: 900px; margin: auto; padding: 40px 20px; }
        section { margin-bottom: 60px; }
        h3 { border-left: 5px solid #38bdf8; padding-left: 15px; margin-bottom: 30px; }

        /* 5. 다운로드 버튼 상자 */
        .download-box {
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        .btn-group .btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }
        .btn:hover { background: #7dd3fc; }

        /* 6. 깔끔한 표 디자인 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #334155; text-align: center; }
        th { background: #334155; color: #38bdf8; }

        /* 7. 하단 후원/문의 카드 */
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        .link-btn {
            display: block;
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
        }
        .link-btn:hover { background: #475569; }
    </style>
</head>
<body>

    <header>

            <div class="footer-grid">
                <div class="card">

                    <p>토스뱅크 1908-1218-3479로 따뜻한 마음을<br>보내주세요.</p>

                <div class="card">

    </div>

</body>
</html>
